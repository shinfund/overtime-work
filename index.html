<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>노선 연장근무 대시보드</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet"/>
<style>
:root{
  --sky:#378ADD; --sky50:#E6F1FB; --sky100:#B5D4F4; --sky600:#185FA5; --sky800:#0C447C;
  --teal:#1D9E75; --teal50:#E1F5EE; --teal100:#9FE1CB; --teal600:#0F6E56;
  --coral:#D85A30; --coral50:#FAECE7; --coral100:#F5C4B3;
  --amber:#BA7517; --amber50:#FAEEDA; --amber100:#FAC775;
  --green:#639922; --green50:#EAF3DE; --green100:#C0DD97;
  --purple:#534AB7; --purple50:#EEEDFE; --purple100:#CECBF6;
  --bg:#F5F8FF; --card:#FFFFFF; --border:#E0EAF5; --border2:#EBF3FF;
  --txt:#1A2535; --txt2:#3D4F68; --txt3:#6B7E99;
  --r6:6px; --r8:8px; --r12:12px; --r16:16px; --r20:20px;
  --shadow:0 2px 12px rgba(55,138,221,.08);
  --shadow-hover:0 6px 24px rgba(55,138,221,.15);
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans KR',-apple-system,sans-serif;background:var(--bg);color:var(--txt);font-size:15px;line-height:1.7;word-break:keep-all;-webkit-font-smoothing:antialiased;min-height:100dvh}

/* ── HEADER ── */
.header{background:var(--sky800);padding:16px 20px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;box-shadow:0 2px 12px rgba(12,68,124,.25)}
.header-left{display:flex;align-items:center;gap:12px}
.logo-mark{width:38px;height:38px;background:rgba(255,255,255,.15);border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.logo-title{font-size:17px;font-weight:700;color:#fff}
.logo-sub{font-size:11px;color:rgba(255,255,255,.65);font-weight:400}
.header-right{display:flex;align-items:center;gap:8px}
.cfg-btn{background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);color:#fff;border-radius:var(--r8);padding:6px 12px;font-size:13px;font-family:inherit;cursor:pointer;transition:background .18s;min-height:36px}
.cfg-btn:hover{background:rgba(255,255,255,.25)}
.sync-btn{background:var(--teal);border:none;color:#fff;border-radius:var(--r8);padding:6px 14px;font-size:13px;font-family:inherit;cursor:pointer;font-weight:600;transition:all .18s;min-height:36px;display:flex;align-items:center;gap:6px}
.sync-btn:hover{background:var(--teal600);transform:translateY(-1px)}
.sync-btn:disabled{opacity:.5;cursor:not-allowed;transform:none}

/* ── STATUS BAR ── */
.status-bar{background:var(--sky50);border-bottom:1px solid var(--sky100);padding:8px 20px;display:flex;align-items:center;gap:8px;font-size:12px;color:var(--txt2)}
.status-dot{width:8px;height:8px;border-radius:50%;background:#ccc;flex-shrink:0}
.status-dot.ok{background:var(--teal)}
.status-dot.err{background:var(--coral)}
.status-dot.loading{background:var(--amber);animation:pulse .8s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}

/* ── MAIN ── */
.main{padding:16px 20px;max-width:1100px;margin:0 auto}

/* ── MONTH NAV ── */
.month-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;background:var(--card);border:1px solid var(--border);border-radius:var(--r12);padding:12px 16px;box-shadow:var(--shadow)}
.month-nav-btn{background:var(--sky50);border:1px solid var(--sky100);color:var(--sky800);border-radius:var(--r8);padding:6px 14px;font-size:14px;font-weight:600;cursor:pointer;transition:all .18s;min-height:36px}
.month-nav-btn:hover{background:var(--sky100)}
.month-label{font-size:18px;font-weight:700;color:var(--txt)}
.month-label span{font-size:13px;font-weight:400;color:var(--txt3);margin-left:8px}

/* ── KPI CARDS ── */
.kpi-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;margin-bottom:16px}
@media(min-width:600px){.kpi-grid{grid-template-columns:repeat(4,1fr)}}
.kpi-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r12);padding:14px 16px;box-shadow:var(--shadow);transition:box-shadow .18s}
.kpi-card:hover{box-shadow:var(--shadow-hover)}
.kpi-label{font-size:11px;font-weight:500;color:var(--txt3);letter-spacing:.03em;margin-bottom:4px;text-transform:uppercase}
.kpi-value{font-size:24px;font-weight:900;color:var(--txt);line-height:1.2}
.kpi-value span{font-size:13px;font-weight:500;color:var(--txt3);margin-left:2px}
.kpi-sub{font-size:11px;color:var(--txt3);margin-top:2px}
.kpi-card.sky .kpi-value{color:var(--sky600)}
.kpi-card.teal .kpi-value{color:var(--teal600)}
.kpi-card.amber .kpi-value{color:var(--amber)}
.kpi-card.purple .kpi-value{color:var(--purple)}

/* ── TABS ── */
.tab-wrap{display:flex;gap:6px;margin-bottom:16px;background:var(--card);border:1px solid var(--border);border-radius:var(--r12);padding:6px;box-shadow:var(--shadow)}
.tab-btn{flex:1;padding:8px 6px;border:none;background:transparent;border-radius:var(--r8);font-size:13px;font-weight:600;color:var(--txt3);cursor:pointer;transition:all .18s;min-height:36px;font-family:inherit}
.tab-btn.active{background:var(--sky);color:#fff;box-shadow:0 2px 8px rgba(55,138,221,.3)}
.tab-btn:not(.active):hover{background:var(--sky50);color:var(--sky600)}

/* ── PANEL ── */
.panel{display:none}
.panel.active{display:block}

/* ── SECTION CARD ── */
.section-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r16);padding:16px;box-shadow:var(--shadow);margin-bottom:16px}
.section-title{font-size:14px;font-weight:700;color:var(--txt);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.section-title .badge{font-size:11px;font-weight:600;background:var(--sky50);color:var(--sky600);border-radius:20px;padding:2px 8px;border:1px solid var(--sky100)}

/* ── TABLE ── */
.tbl-wrap{overflow-x:auto;-webkit-overflow-scrolling:touch;border-radius:var(--r8);border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;min-width:500px}
thead tr{background:var(--sky50)}
th{padding:10px 12px;text-align:left;font-size:12px;font-weight:700;color:var(--sky600);white-space:nowrap;border-bottom:1px solid var(--sky100)}
th:last-child{text-align:right}
td{padding:10px 12px;font-size:13px;color:var(--txt);border-bottom:1px solid var(--border2);vertical-align:middle}
td:last-child{text-align:right;font-weight:600}
tr:last-child td{border-bottom:none}
tr:hover td{background:var(--sky50)}

/* ── ROUTE BADGE ── */
.route-badge{display:inline-flex;align-items:center;padding:3px 8px;border-radius:20px;font-size:11px;font-weight:700;white-space:nowrap}

/* ── RANK ── */
.rank-num{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0}
.rank-1{background:#FFD700;color:#7a5900}
.rank-2{background:#C0C0C0;color:#444}
.rank-3{background:#CD7F32;color:#5c2f00}
.rank-n{background:var(--sky50);color:var(--txt3)}

/* ── BAR CHART ── */
.bar-row{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.bar-label{font-size:12px;color:var(--txt2);width:80px;flex-shrink:0;text-align:right;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.bar-track{flex:1;background:var(--border);border-radius:4px;height:18px;overflow:hidden}
.bar-fill{height:100%;border-radius:4px;transition:width .5s ease;display:flex;align-items:center;padding-left:8px;font-size:11px;font-weight:700;color:#fff;white-space:nowrap}
.bar-val{font-size:12px;font-weight:700;color:var(--txt);width:50px;flex-shrink:0;text-align:right}

/* ── LIST ROW ── */
.list-row{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border2)}
.list-row:last-child{border-bottom:none}
.list-main{flex:1;min-width:0}
.list-name{font-size:14px;font-weight:600;color:var(--txt)}
.list-meta{font-size:12px;color:var(--txt3);margin-top:1px}
.list-right{text-align:right;flex-shrink:0}
.list-hours{font-size:16px;font-weight:900;color:var(--sky600)}
.list-days{font-size:11px;color:var(--txt3)}

/* ── DETAIL TABLE ── */
.filter-row{display:flex;gap:8px;margin-bottom:12px;flex-wrap:wrap}
.filter-select{background:var(--card);border:1px solid var(--border);border-radius:var(--r8);padding:7px 12px;font-size:13px;font-family:inherit;color:var(--txt);cursor:pointer;min-height:36px}
.detail-count{font-size:12px;color:var(--txt3);padding:4px 0 8px}

/* ── EMPTY STATE ── */
.empty-state{text-align:center;padding:48px 24px;color:var(--txt3)}
.empty-icon{font-size:40px;margin-bottom:12px}
.empty-title{font-size:15px;font-weight:600;margin-bottom:6px;color:var(--txt2)}
.empty-desc{font-size:13px}

/* ── EXCEL BTN ── */
.excel-btn{background:var(--green50);border:1px solid var(--green100);color:var(--green);border-radius:var(--r8);padding:8px 16px;font-size:13px;font-weight:600;cursor:pointer;transition:all .18s;min-height:36px;font-family:inherit;display:inline-flex;align-items:center;gap:6px}
.excel-btn:hover{background:var(--green100)}

/* ── MODAL ── */
#cfgModal{display:none}
.modal-backdrop{position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(0,0,0,.55);z-index:9000;display:flex;align-items:center;justify-content:center;padding:20px}
.modal-box{background:var(--card);border-radius:var(--r20);padding:24px;width:100%;max-width:480px;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-title{font-size:17px;font-weight:700;margin-bottom:20px;color:var(--txt);display:flex;align-items:center;gap:8px}
.modal-field{margin-bottom:16px}
.modal-label{font-size:12px;font-weight:600;color:var(--txt2);margin-bottom:6px;display:block}
.modal-input{width:100%;background:var(--bg);border:1px solid var(--border);border-radius:var(--r8);padding:10px 12px;font-size:15px;font-family:inherit;color:var(--txt);outline:none;transition:border .18s}
.modal-input:focus{border-color:var(--sky);background:#fff}
.modal-hint{font-size:11px;color:var(--txt3);margin-top:4px}
.modal-btns{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
.modal-save{background:var(--sky);border:none;color:#fff;border-radius:var(--r8);padding:10px 20px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;min-height:40px}
.modal-cancel{background:var(--bg);border:1px solid var(--border);color:var(--txt2);border-radius:var(--r8);padding:10px 20px;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit;min-height:40px}

/* ── LOADING ── */
.loading-wrap{text-align:center;padding:40px;color:var(--txt3)}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--sky);border-radius:50%;animation:spin .7s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}

@media(max-width:480px){
  .main{padding:12px 12px}
  .header{padding:12px}
  .logo-title{font-size:15px}
  .tab-btn{font-size:12px;padding:7px 4px}
}
</style>
</head>
<body>

<!-- MODAL -->
<div id="cfgModal">
  <div class="modal-backdrop" onclick="closeCfgModal(event)">
    <div class="modal-box" onclick="event.stopPropagation()">
      <div class="modal-title">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.07 4.93A10 10 0 0 0 4.93 19.07M19.07 19.07A10 10 0 0 0 4.93 4.93"/></svg>
        설정
      </div>
      <div class="modal-field">
        <label class="modal-label">Cloudflare Worker URL</label>
        <input id="cfgWorkerUrl" class="modal-input" type="url" placeholder="https://your-worker.workers.dev"/>
        <div class="modal-hint">Notion API 프록시 Worker 엔드포인트</div>
      </div>
      <div class="modal-field">
        <label class="modal-label">노션 DB ID <small style="font-weight:400;color:var(--txt3)">(연장근무 DB)</small></label>
        <input id="cfgDbId" class="modal-input" type="text" placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"/>
      </div>
      <div class="modal-btns">
        <button class="modal-cancel" onclick="closeCfgModal()">취소</button>
        <button class="modal-save" onclick="saveCfg()">저장</button>
      </div>
    </div>
  </div>
</div>

<!-- HEADER -->
<div class="header">
  <div class="header-left">
    <div class="logo-mark">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/><path d="M8 14h.01M12 14h.01M16 14h.01M8 18h.01M12 18h.01"/></svg>
    </div>
    <div>
      <div class="logo-title">노선 연장근무</div>
      <div class="logo-sub">Overtime Dashboard</div>
    </div>
  </div>
  <div class="header-right">
    <button class="cfg-btn" onclick="openCfgModal()">⚙ 설정</button>
    <button class="sync-btn" id="syncBtn" onclick="loadData()">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="23 4 23 10 17 10"/><polyline points="1 20 1 14 7 14"/><path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg>
      동기화
    </button>
  </div>
</div>

<!-- STATUS BAR -->
<div class="status-bar">
  <div class="status-dot" id="statusDot"></div>
  <span id="statusMsg">설정 후 동기화 버튼을 눌러 데이터를 불러오세요.</span>
</div>

<!-- MAIN -->
<div class="main">
  <!-- MONTH NAV -->
  <div class="month-nav">
    <button class="month-nav-btn" onclick="changeMonth(-1)">&#8249; 이전달</button>
    <div>
      <div class="month-label" id="monthLabel">2026년 5월 <span id="recordCount"></span></div>
    </div>
    <button class="month-nav-btn" onclick="changeMonth(1)">다음달 &#8250;</button>
  </div>

  <!-- KPI -->
  <div class="kpi-grid">
    <div class="kpi-card sky">
      <div class="kpi-label">총 연장시간</div>
      <div class="kpi-value" id="kpiTotalHours">—<span>h</span></div>
      <div class="kpi-sub" id="kpiTotalDays">—건</div>
    </div>
    <div class="kpi-card teal">
      <div class="kpi-label">참여 직원</div>
      <div class="kpi-value" id="kpiEmployeeCount">—<span>명</span></div>
      <div class="kpi-sub" id="kpiAvgHoursPerPerson">1인 평균 —h</div>
    </div>
    <div class="kpi-card amber">
      <div class="kpi-label">노선 수</div>
      <div class="kpi-value" id="kpiRouteCount">—<span>개</span></div>
      <div class="kpi-sub" id="kpiTopRoute">최다 —</div>
    </div>
    <div class="kpi-card purple">
      <div class="kpi-label">최대 연장자</div>
      <div class="kpi-value" id="kpiTopPerson" style="font-size:18px">—</div>
      <div class="kpi-sub" id="kpiTopPersonHours">—h</div>
    </div>
  </div>

  <!-- TABS -->
  <div class="tab-wrap">
    <button class="tab-btn active" onclick="switchTab('monthly')">월별 집계</button>
    <button class="tab-btn" onclick="switchTab('employee')">직원별</button>
    <button class="tab-btn" onclick="switchTab('route')">노선별</button>
    <button class="tab-btn" onclick="switchTab('detail')">상세 내역</button>
  </div>

  <!-- TAB: 월별 집계 -->
  <div id="tab-monthly" class="panel active">
    <div class="section-card">
      <div class="section-title">노선별 연장시간 분포 <span class="badge" id="routeDistBadge">0개 노선</span></div>
      <div id="routeBarChart"></div>
    </div>
    <div class="section-card">
      <div class="section-title">직원별 연장시간 Top 10</div>
      <div id="empBarChart"></div>
    </div>
  </div>

  <!-- TAB: 직원별 -->
  <div id="tab-employee" class="panel">
    <div class="section-card">
      <div class="section-title">직원별 통계 <span class="badge" id="empBadge">0명</span>
        <button class="excel-btn" style="margin-left:auto" onclick="exportExcel('employee')">📥 엑셀 다운로드</button>
      </div>
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>순위</th><th>직원명</th><th>연장 일수</th><th>총 연장시간</th><th>평균 시간/회</th></tr></thead>
          <tbody id="empTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- TAB: 노선별 -->
  <div id="tab-route" class="panel">
    <div class="section-card">
      <div class="section-title">노선별 통계 <span class="badge" id="routeBadge">0개</span>
        <button class="excel-btn" style="margin-left:auto" onclick="exportExcel('route')">📥 엑셀 다운로드</button>
      </div>
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>순위</th><th>노선명</th><th>연장 건수</th><th>총 연장시간</th><th>참여 인원</th></tr></thead>
          <tbody id="routeTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- TAB: 상세 내역 -->
  <div id="tab-detail" class="panel">
    <div class="section-card">
      <div class="section-title">상세 내역
        <button class="excel-btn" style="margin-left:auto" onclick="exportExcel('detail')">📥 엑셀 다운로드</button>
      </div>
      <div class="filter-row">
        <select class="filter-select" id="filterRoute" onchange="renderDetail()">
          <option value="">전체 노선</option>
        </select>
        <select class="filter-select" id="filterEmployee" onchange="renderDetail()">
          <option value="">전체 직원</option>
        </select>
      </div>
      <div class="detail-count" id="detailCount"></div>
      <div class="tbl-wrap">
        <table>
          <thead><tr><th>날짜</th><th>직원명</th><th>노선명</th><th>연장시간</th></tr></thead>
          <tbody id="detailTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

</div><!-- /main -->

<script>
// ── 설정 ──────────────────────────────────────────────
let CFG = {
  workerUrl: localStorage.getItem('ot_workerUrl') || '',
  dbId:      localStorage.getItem('ot_dbId')      || ''
};

function openCfgModal(){
  document.getElementById('cfgWorkerUrl').value = CFG.workerUrl;
  document.getElementById('cfgDbId').value      = CFG.dbId;
  const m = document.getElementById('cfgModal');
  m.style.cssText = 'display:block';
  document.body.style.overflow = 'hidden';
}
function closeCfgModal(e){
  if(e && e.target !== document.querySelector('.modal-backdrop')) return;
  document.getElementById('cfgModal').style.cssText = 'display:none';
  document.body.style.overflow = '';
}
function saveCfg(){
  CFG.workerUrl = document.getElementById('cfgWorkerUrl').value.trim();
  CFG.dbId      = document.getElementById('cfgDbId').value.trim();
  localStorage.setItem('ot_workerUrl', CFG.workerUrl);
  localStorage.setItem('ot_dbId',      CFG.dbId);
  document.getElementById('cfgModal').style.cssText = 'display:none';
  document.body.style.overflow = '';
  setStatus('idle','설정이 저장되었습니다. 동기화 버튼을 눌러 데이터를 불러오세요.');
}

// ── 날짜 상태 ─────────────────────────────────────────
let curYear  = new Date().getFullYear();
let curMonth = new Date().getMonth() + 1;

function changeMonth(d){
  curMonth += d;
  if(curMonth > 12){ curMonth = 1;  curYear++; }
  if(curMonth < 1) { curMonth = 12; curYear--; }
  updateMonthLabel();
  if(ALL_RECORDS.length) renderAll();
}
function updateMonthLabel(){
  document.getElementById('monthLabel').innerHTML =
    `${curYear}년 ${curMonth}월 <span id="recordCount"></span>`;
  updateRecordCount();
}
function updateRecordCount(){
  const n = filteredRecords().length;
  const el = document.getElementById('recordCount');
  if(el) el.textContent = n ? `(${n}건)` : '';
}

// ── 상태 바 ───────────────────────────────────────────
function setStatus(type, msg){

// ── 탭 ───────────────────────────────────────────────
function switchTab(name){

// ── 전역 데이터 ───────────────────────────────────────
let ALL_RECORDS = [];

// ── Notion 필드 매핑 (설정 가능하게 설계) ─────────────
// 아래 키는 실제 노션 DB 필드명에 맞게 수정하세요
const FIELD = {
  date:     'date',       // 날짜 필드
  employee: 'employee',   // 직원/이름 필드
  route:    'route',      // 노선명 필드
  hours:    'hours'       // 연장시간 필드
};

// ── 노션 → 레코드 변환 ────────────────────────────────
function parseNotionPage(page){
  const props = page.properties || {};
  // 날짜 추출
  let date = '';
  for(const [k,v] of Object.entries(props)){
    if(v.type === 'date' && v.date){
      date = (v.date.start || '').slice(0,10); break;
    }
    if(v.type === 'created_time'){ date = v.created_time?.slice(0,10)||''; }
  }
  // 텍스트/제목 추출 helper
  function getText(prop){
    if(!prop) return '';
    if(prop.type==='title')   return prop.title?.map(t=>t.plain_text||'').join('') || '';
    if(prop.type==='rich_text') return prop.rich_text?.map(t=>t.plain_text||'').join('') || '';
    if(prop.type==='select')  return prop.select?.name || '';
    if(prop.type==='number')  return prop.number ?? 0;
    if(prop.type==='formula') return prop.formula?.number ?? prop.formula?.string ?? '';
    if(prop.type==='rollup')  return '';
    return '';
  }
  // 숫자 추출 helper
  function getNum(prop){
    if(!prop) return 0;
    if(prop.type==='number') return parseFloat(prop.number||0);
    if(prop.type==='formula') return parseFloat(prop.formula?.number||0);
    const t = getText(prop);
    return parseFloat(t) || 0;
  }

  // 필드명 자동 매핑 (부분 문자열 매칭)
  let employee='', route='', hours=0;
  for(const [k,v] of Object.entries(props)){
    const lk = k.toLowerCase();
    if(!employee && (lk.includes('직원')||lk.includes('성명')||lk.includes('이름')||lk.includes('name')||v.type==='title'))
      employee = getText(v) || employee;
    if(!route && (lk.includes('노선')||lk.includes('route')||lk.includes('구간')))
      route = getText(v);
    if(!hours && (lk.includes('시간')||lk.includes('hour')||lk.includes('연장')||lk.includes('overtime')))
      hours = getNum(v);
  }
  // title 필드 fallback for employee
  if(!employee){
    const titleProp = Object.values(props).find(p=>p.type==='title');
    if(titleProp) employee = getText(titleProp);
  }
  return { id: page.id, date, employee: employee.trim(), route: route.trim(), hours };
}

// ── 데이터 로드 ───────────────────────────────────────
async function loadData(){
  if(!CFG.workerUrl || !CFG.dbId){
    openCfgModal();
    setStatus('err','Worker URL과 DB ID를 먼저 설정해 주세요.');
    return;
  }
  const btn = document.getElementById('syncBtn');
  btn.disabled = true;
  setStatus('loading','노션에서 데이터를 불러오는 중...');

  try{
    // 해당 월 필터 조건
    const startDate = `${curYear}-${String(curMonth).padStart(2,'0')}-01`;
    const endDate   = new Date(curYear, curMonth, 0).toISOString().slice(0,10);

    const body = {
      database_id: CFG.dbId,
      page_size: 100,
      filter:{
        and:[
          { property:'date', date:{ on_or_after: startDate } },
          { property:'date', date:{ on_or_before: endDate  } }
        ]
      },
      sorts:[{ property:'date', direction:'ascending' }]
    };

    // Cloudflare Worker 프록시 호출
    const res = await fetch(`${CFG.workerUrl}/v1/databases/${CFG.dbId}/query`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });

    if(!res.ok){
      const err = await res.text();
      throw new Error(`HTTP ${res.status}: ${err.slice(0,120)}`);
    }

    const data = await res.json();
    let pages = data.results || [];

    // 페이지네이션 처리
    let cursor = data.next_cursor;
    while(cursor && data.has_more){
      const r2 = await fetch(`${CFG.workerUrl}/v1/databases/${CFG.dbId}/query`,{
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({...body, start_cursor: cursor})
      });
      const d2 = await r2.json();
      pages = [...pages, ...(d2.results||[])];
      cursor = d2.next_cursor;
      if(!d2.has_more) break;
    }

    ALL_RECORDS = pages.map(parseNotionPage).filter(r => r.date && r.employee);
    renderAll();
    setStatus('ok', `${ALL_RECORDS.length}건 로드 완료 (${curYear}.${curMonth})`);

  } catch(e){
    setStatus('err', '오류: ' + e.message);
  } finally{
    btn.disabled = false;
  }
}

// ── 필터된 레코드 ─────────────────────────────────────
function filteredRecords(){
  const ym = `${curYear}-${String(curMonth).padStart(2,'0')}`;
  return ALL_RECORDS.filter(r => r.date.startsWith(ym));
}

// ── 전체 렌더 ─────────────────────────────────────────
function renderAll(){
  updateMonthLabel();
  renderKPI();
  renderMonthly();
  renderEmployee();
  renderRoute();
  renderDetail();
}

// ── 색상 팔레트 ───────────────────────────────────────
const COLORS = [
  '#378ADD','#1D9E75','#BA7517','#534AB7','#D85A30',
  '#639922','#993556','#0C447C','#0F6E56','#633806'
];
const ROUTE_COLORS = {};
let colorIdx = 0;
function routeColor(name){
  if(!ROUTE_COLORS[name]){ ROUTE_COLORS[name] = COLORS[colorIdx++ % COLORS.length]; }
  return ROUTE_COLORS[name];
}
function routeBadgeStyle(name){
  const c = routeColor(name);
  return `background:${c}22;color:${c};border:1px solid ${c}55`;
}

// ── KPI ───────────────────────────────────────────────
function renderKPI(){
  const recs = filteredRecords();
  const totalH = recs.reduce((s,r)=>s+r.hours,0);
  const emps   = [...new Set(recs.map(r=>r.employee).filter(Boolean))];
  const routes = [...new Set(recs.map(r=>r.route).filter(Boolean))];

  // 직원별 합계
  const empMap = {};
  recs.forEach(r=>{ if(r.employee) empMap[r.employee]=(empMap[r.employee]||0)+r.hours; });
  const topEmp = Object.entries(empMap).sort((a,b)=>b[1]-a[1])[0];

  // 노선별 합계
  const routeMap = {};
  recs.forEach(r=>{ if(r.route) routeMap[r.route]=(routeMap[r.route]||0)+r.hours; });
  const topRoute = Object.entries(routeMap).sort((a,b)=>b[1]-a[1])[0];

  const avg = emps.length ? (totalH/emps.length).toFixed(1) : 0;

  document.getElementById('kpiTotalHours').innerHTML  = `${fmtH(totalH)}<span>h</span>`;
  document.getElementById('kpiTotalDays').textContent = `${recs.length}건`;
  document.getElementById('kpiEmployeeCount').innerHTML = `${emps.length}<span>명</span>`;
  document.getElementById('kpiAvgHoursPerPerson').textContent = `1인 평균 ${avg}h`;
  document.getElementById('kpiRouteCount').innerHTML = `${routes.length}<span>개</span>`;
  document.getElementById('kpiTopRoute').textContent = topRoute ? `최다 ${topRoute[0]}` : '—';
  document.getElementById('kpiTopPerson').textContent  = topEmp ? topEmp[0] : '—';
  document.getElementById('kpiTopPersonHours').textContent = topEmp ? `${fmtH(topEmp[1])}h` : '—h';
}

function fmtH(h){
  return Number.isInteger(h) ? h : parseFloat(h).toFixed(1);
}

// ── 월별 탭: 바 차트 ──────────────────────────────────
function renderMonthly(){
  const recs = filteredRecords();

  // 노선별
  const routeMap = {};
  recs.forEach(r=>{ if(r.route) routeMap[r.route]=(routeMap[r.route]||0)+r.hours; });
  const routes = Object.entries(routeMap).sort((a,b)=>b[1]-a[1]);
  const maxR = routes[0]?.[1] || 1;

  document.getElementById('routeDistBadge').textContent = `${routes.length}개 노선`;
  document.getElementById('routeBarChart').innerHTML = routes.length
    ? routes.map(([name,h])=>{
        const pct = (h/maxR*100).toFixed(1);
        const c = routeColor(name);
        return `<div class="bar-row">
          <div class="bar-label" title="${name}">${name}</div>
          <div class="bar-track">
            <div class="bar-fill" style="width:${pct}%;background:${c}">${fmtH(h)}h</div>
          </div>
          <div class="bar-val">${fmtH(h)}h</div>
        </div>`;
      }).join('')
    : emptyState('데이터 없음','이번 달 노선 데이터가 없습니다.');

  // 직원별 Top10
  const empMap = {};
  recs.forEach(r=>{ if(r.employee) empMap[r.employee]=(empMap[r.employee]||0)+r.hours; });
  const emps = Object.entries(empMap).sort((a,b)=>b[1]-a[1]).slice(0,10);
  const maxE = emps[0]?.[1] || 1;

  document.getElementById('empBarChart').innerHTML = emps.length
    ? emps.map(([name,h],i)=>{
        const pct = (h/maxE*100).toFixed(1);
        return `<div class="bar-row">
          <div class="bar-label" title="${name}">${name}</div>
          <div class="bar-track">
            <div class="bar-fill" style="width:${pct}%;background:${COLORS[i%COLORS.length]}">${fmtH(h)}h</div>
          </div>
          <div class="bar-val">${fmtH(h)}h</div>
        </div>`;
      }).join('')
    : emptyState('데이터 없음','이번 달 직원 데이터가 없습니다.');
}

// ── 직원별 탭 ─────────────────────────────────────────
function renderEmployee(){
  const recs = filteredRecords();
  const empMap = {};
  recs.forEach(r=>{
    if(!r.employee) return;
    if(!empMap[r.employee]) empMap[r.employee]={hours:0,count:0};
    empMap[r.employee].hours += r.hours;
    empMap[r.employee].count++;
  });
  const emps = Object.entries(empMap).sort((a,b)=>b[1].hours-a[1].hours);
  document.getElementById('empBadge').textContent = `${emps.length}명`;

  document.getElementById('empTableBody').innerHTML = emps.length
    ? emps.map(([name,d],i)=>`
      <tr>
        <td><div style="display:flex;align-items:center;gap:6px">
          <div class="rank-num ${i<3?'rank-'+(i+1):'rank-n'}">${i+1}</div>
        </div></td>
        <td style="font-weight:600">${name}</td>
        <td>${d.count}일</td>
        <td><b style="color:var(--sky600)">${fmtH(d.hours)}h</b></td>
        <td>${fmtH(d.hours/d.count)}h/회</td>
      </tr>`)
      .join('')
    : `<tr><td colspan="5">${emptyState('데이터 없음','이번 달 직원 데이터가 없습니다.')}</td></tr>`;
}

// ── 노선별 탭 ─────────────────────────────────────────
function renderRoute(){
  const recs = filteredRecords();
  const routeMap = {};
  recs.forEach(r=>{
    if(!r.route) return;
    if(!routeMap[r.route]) routeMap[r.route]={hours:0,count:0,emps:new Set()};
    routeMap[r.route].hours += r.hours;
    routeMap[r.route].count++;
    if(r.employee) routeMap[r.route].emps.add(r.employee);
  });
  const routes = Object.entries(routeMap).sort((a,b)=>b[1].hours-a[1].hours);
  document.getElementById('routeBadge').textContent = `${routes.length}개`;

  document.getElementById('routeTableBody').innerHTML = routes.length
    ? routes.map(([name,d],i)=>`
      <tr>
        <td><div style="display:flex;align-items:center;gap:6px">
          <div class="rank-num ${i<3?'rank-'+(i+1):'rank-n'}">${i+1}</div>
        </div></td>
        <td><span class="route-badge" style="${routeBadgeStyle(name)}">${name}</span></td>
        <td>${d.count}건</td>
        <td><b style="color:var(--sky600)">${fmtH(d.hours)}h</b></td>
        <td>${d.emps.size}명</td>
      </tr>`)
      .join('')
    : `<tr><td colspan="5">${emptyState('데이터 없음','이번 달 노선 데이터가 없습니다.')}</td></tr>`;
}

// ── 상세 내역 탭 ──────────────────────────────────────
function renderDetail(){
  const recs = filteredRecords();

  // 필터 옵션 갱신
  const selRoute = document.getElementById('filterRoute');
  const selEmp   = document.getElementById('filterEmployee');
  const prevRoute = selRoute.value;
  const prevEmp   = selEmp.value;

  const routes = [...new Set(recs.map(r=>r.route).filter(Boolean))].sort();
  const emps   = [...new Set(recs.map(r=>r.employee).filter(Boolean))].sort();

  selRoute.innerHTML = '<option value="">전체 노선</option>' +
    routes.map(r=>`<option value="${esc(r)}">${r}</option>`).join('');
  selEmp.innerHTML   = '<option value="">전체 직원</option>' +
    emps.map(e=>`<option value="${esc(e)}">${e}</option>`).join('');
  selRoute.value = prevRoute;
  selEmp.value   = prevEmp;

  let filtered = recs;
  if(selRoute.value) filtered = filtered.filter(r=>r.route===selRoute.value);
  if(selEmp.value)   filtered = filtered.filter(r=>r.employee===selEmp.value);

  document.getElementById('detailCount').textContent = `총 ${filtered.length}건`;
  document.getElementById('detailTableBody').innerHTML = filtered.length
    ? filtered.map(r=>`
      <tr>
        <td>${r.date}</td>
        <td style="font-weight:600">${r.employee}</td>
        <td><span class="route-badge" style="${routeBadgeStyle(r.route)}">${r.route||'—'}</span></td>
        <td>${fmtH(r.hours)}h</td>
      </tr>`)
      .join('')
    : `<tr><td colspan="4">${emptyState('데이터 없음','조건에 맞는 내역이 없습니다.')}</td></tr>`;
}

function esc(s){ return (s||'').replace(/"/g,'&quot;'); }

// ── 빈 상태 ───────────────────────────────────────────
function emptyState(title, desc){
  return `<div class="empty-state">
    <div class="empty-icon">📋</div>
    <div class="empty-title">${title}</div>
    <div class="empty-desc">${desc}</div>
  </div>`;
}

// ── 엑셀 다운로드 (SheetJS CDN 없이 CSV로 대체) ───────
function exportExcel(type){
  const recs = filteredRecords();
  let rows=[], filename='';
  const ym = `${curYear}${String(curMonth).padStart(2,'0')}`;

  if(type==='employee'){
    const empMap={};
    recs.forEach(r=>{ if(!r.employee) return;
      if(!empMap[r.employee]) empMap[r.employee]={hours:0,count:0};
      empMap[r.employee].hours+=r.hours; empMap[r.employee].count++; });
    rows = [['순위','직원명','연장일수','총연장시간(h)','평균시간/회']];
    Object.entries(empMap).sort((a,b)=>b[1].hours-a[1].hours).forEach(([n,d],i)=>{
      rows.push([i+1,n,d.count,fmtH(d.hours),fmtH(d.hours/d.count)]);
    });
    filename = `직원별연장근무_${ym}.csv`;
  } else if(type==='route'){
    const routeMap={};
    recs.forEach(r=>{ if(!r.route) return;
      if(!routeMap[r.route]) routeMap[r.route]={hours:0,count:0,emps:new Set()};
      routeMap[r.route].hours+=r.hours; routeMap[r.route].count++;
      if(r.employee) routeMap[r.route].emps.add(r.employee); });
    rows = [['순위','노선명','연장건수','총연장시간(h)','참여인원']];
    Object.entries(routeMap).sort((a,b)=>b[1].hours-a[1].hours).forEach(([n,d],i)=>{
      rows.push([i+1,n,d.count,fmtH(d.hours),d.emps.size]);
    });
    filename = `노선별연장근무_${ym}.csv`;
  } else {
    rows = [['날짜','직원명','노선명','연장시간(h)']];
    recs.forEach(r=>rows.push([r.date,r.employee,r.route,fmtH(r.hours)]));
    filename = `연장근무상세_${ym}.csv`;
  }

  const csv = '\uFEFF' + rows.map(r=>r.map(v=>`"${v}"`).join(',')).join('\n');
  const blob = new Blob([csv],{type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}
